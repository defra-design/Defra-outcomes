# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Add these in the Render dashboard (Environment):
#   PASSWORD=<strong secret>   — required for the kit in production (never commit it)
#
# Optional in dashboard if you remove useHttps from app/config.json:
#   USE_HTTPS=false

services:
  - type: web
    name: defra-outcomes
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_HTTPS
        value: "false"
